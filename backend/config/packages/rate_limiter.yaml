framework:
    rate_limiter:
        # 5 attempts per minute, keyed by client IP — see App\Security\RateLimiter\IpLoginRateLimiter,
        # wired into the "main" firewall's login_throttling (config/packages/security.yaml).
        login_by_ip:
            policy: fixed_window
            limit: 5
            interval: '1 minute'

        # 5 tentatives / heure, keyed by client IP — voir App\Controller\RegistrationController.
        register_by_ip:
            policy: fixed_window
            limit: 5
            interval: '1 hour'

        # Même politique que login_by_ip ci-dessus (ML-78 reprend explicitement le
        # mécanisme de ML-20) — voir App\Controller\PasswordResetController. Limite
        # les demandes, pas la confirmation (protégée par le token lui-même).
        password_reset_request_by_ip:
            policy: fixed_window
            limit: 5
            interval: '1 minute'

when@dev:
    framework:
        rate_limiter:
            # Limite très large en dev : la collection Postman ML-57 enchaîne plus de
            # 5 appels /api/auth/register (succès + cas d'erreur 400/409) dans un même
            # run. La prod garde 5/heure (voir plus haut), inchangé.
            register_by_ip:
                policy: fixed_window
                limit: 1000
                interval: '1 minute'
