monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists
        # ML-31: tentatives de login échouées, 403, 5xx — jamais de données
        # personnelle. Volontairement PAS nommé "security" : c'est le nom du
        # canal interne du composant Security de Symfony, qui logge lui-même
        # des messages contenant l'email en cas d'échec d'authentification
        # (UserNotFoundException). Ce canal natif "security" est donc exclu
        # de tous les handlers ci-dessous pour ne jamais persister de PII.
        - security_audit

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event", "!security", "!security_audit"]
            security_audit:
                type: stream
                path: "%kernel.logs_dir%/security.log"
                level: info
                channels: ["security_audit"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console", "!security"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event", "!security"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!deprecation", "!security", "!security_audit"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            # ML-93 : écrit sur stderr, pas sur un fichier — le conteneur de
            # prod tourne en www-data sans droit d'écriture sur
            # /var/www/html (image buildée en root, var/ absent de l'image
            # car gitignoré), donc un chemin fichier sous var/log échoue en
            # "Permission denied" au premier log. Même pattern que
            # main/deprecation ci-dessus.
            security_audit:
                type: stream
                path: "php://stderr"
                level: info
                channels: ["security_audit"]
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!security"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
