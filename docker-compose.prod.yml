services:
  app:
    image: ${BACKEND_IMAGE}
    container_name: medlink_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./jwt:/var/www/html/config/jwt
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Real environment variables take precedence over .env file values in
      # Symfony's Dotenv bootstrap — backend/.env commits APP_ENV=dev as its
      # default, so prod must override it explicitly here rather than rely
      # on an uncommitted .env.local, which env_file above would never load.
      APP_ENV: prod
      APP_DEBUG: 0
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5

  db:
    image: postgres:16-alpine
    container_name: medlink_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medlink}
      POSTGRES_USER: ${POSTGRES_USER:-medlink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - medlink_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medlink} -d ${POSTGRES_DB:-medlink}"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5

volumes:
  medlink_db_data:
