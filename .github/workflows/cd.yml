name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  check-changelog:
    name: Vérifie le CHANGELOG
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: CHANGELOG.md doit être mis à jour (ML-32)
        run: |
          if ! git diff --name-only HEAD^ HEAD | grep -qx 'CHANGELOG.md'; then
            echo "::error::CHANGELOG.md n'a pas été mis à jour par ce merge sur main. Ajoute une entrée avant de déployer."
            exit 1
          fi

  build-and-push:
    name: Build & push image
    needs: check-changelog
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute image name
        id: image
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          sha=${{ github.event.workflow_run.head_sha }}
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner}/medlink-backend:${sha}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: backend
          target: prod
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ghcr.io/${{ steps.image.outputs.owner }}/medlink-backend:latest

  deploy-frontend:
    name: Build & deploy frontend web
    needs: check-changelog
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install & build
        working-directory: frontend-web
        run: |
          npm ci
          npm run build

      - name: Upload build to server (staging dir)
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "frontend-web/dist/*"
          target: "${{ secrets.DEPLOY_PATH }}/frontend/dist_new"
          strip_components: 2

      - name: Atomically swap build into place
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}/frontend
            mkdir -p downloads
            rm -rf dist_old
            [ -d dist ] && mv dist dist_old || true
            mv dist_new dist
            ln -sfn ../downloads dist/downloads
            rm -rf dist_old

  deploy:
    name: Deploy to production
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy new image over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            docker inspect --format='{{.Config.Image}}' medlink_app > .previous_image 2>/dev/null || echo "" > .previous_image
            export BACKEND_IMAGE="${{ needs.build-and-push.outputs.image }}"
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d

      - name: Healthcheck
        run: |
          curl --fail --silent --show-error --retry 6 --retry-delay 5 --retry-all-errors "${{ secrets.HEALTHCHECK_URL }}"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            previous=$(cat .previous_image)
            if [ -n "$previous" ]; then
              export BACKEND_IMAGE="${previous}"
              docker compose -f docker-compose.prod.yml up -d
              echo "Rolled back to ${previous}"
            else
              echo "No previous image recorded, manual intervention required" >&2
              exit 1
            fi
